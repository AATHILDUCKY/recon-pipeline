<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Recon Console{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='report-download.css') }}">
</head>
<body>
  {% if session.authenticated %}
  <header class="topbar"><a class="brand" href="{{ url_for('dashboard') }}"><span>R</span> Recon Console</a>
    <form action="{{ url_for('logout') }}" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="link-button">Sign out</button></form>
  </header>
  {% endif %}
  <main class="shell {% block shell_class %}{% endblock %}">
    {% for category, message in get_flashed_messages(with_categories=true) %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body></html>
